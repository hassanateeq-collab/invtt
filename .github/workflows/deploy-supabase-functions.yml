name: Deploy Supabase Functions

# Auto-deploys all Edge Functions to Supabase whenever their code changes on
# main. One-time setup: add a repo secret SUPABASE_ACCESS_TOKEN
# (Supabase → Account → Access Tokens). The project ref is set below.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: sbbdikzqvuveayxxmdgi
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
